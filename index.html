<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Carousel</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;

      background: linear-gradient(-45deg, #3a7bd5, #7b2ff7, #00d2ff, #4facfe);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel {
      display: flex;
      gap: 40px;
      padding: 40px;
      overflow-x: auto;
      width: 80vw;

      scroll-behavior: smooth;
      scrollbar-width: none;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .menu-item {
      flex: 0 0 auto;
      width: 200px;
      height: 200px;
      background: green;
      border-radius: 20px;
      overflow: hidden;
    }

    .menu-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>

  <div class="menu-overlay">
    <div class="carousel" id="carousel">

      <!-- FIRST ITEM REPLACED WITH IMAGE -->
      <div class="menu-item">
        <img src="minecraft-landscape-poster-h1qxeiq0379px8nr.jpg" />
      </div>

      <div class="menu-item"></div>
      <div class="menu-item"></div>
      <div class="menu-item"></div>

    </div>
  </div>

  <script>
    const carousel = document.getElementById("carousel");

    const items = [...carousel.children];
    items.forEach(item => {
      const clone = item.cloneNode(true);
      carousel.appendChild(clone);
    });

    carousel.addEventListener("scroll", () => {
      const half = carousel.scrollWidth / 2;

      if (carousel.scrollLeft >= half) {
        carousel.scrollLeft -= half;
      }

      if (carousel.scrollLeft <= 0) {
        carousel.scrollLeft += half;
      }
    });
  </script>

</body>
</html>
