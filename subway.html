<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Endless Runner</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
  }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 18px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">Score: 0</div>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

const lanes = [-1, 0, 1];
function laneX(lane) {
  return W/2 + lane * 140;
}

let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

let player = {
  lane: 0,
  y: 0,
  vy: 0,
  jumping: false
};

let obstacles = [];
let timer = 0;
let speed = 6;
let score = 0;
let gameOver = false;

function resetPlayerY() {
  player.y = H - 120;
}
resetPlayerY();

function spawnObstacle() {
  const lane = lanes[Math.floor(Math.random()*3)];
  obstacles.push({ lane, y: -100 });
}

function collide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function update() {
  if (gameOver) return;

  // restart safe movement (no key locking bugs)
  if (keys["ArrowLeft"] || keys["a"]) {
    player.lane = Math.max(-1, player.lane - 1);
    keys["ArrowLeft"] = keys["a"] = false;
  }

  if (keys["ArrowRight"] || keys["d"]) {
    player.lane = Math.min(1, player.lane + 1);
    keys["ArrowRight"] = keys["d"] = false;
  }

  if ((keys["ArrowUp"] || keys[" "]) && !player.jumping) {
    player.vy = -16;
    player.jumping = true;
  }

  player.vy += 0.9;
  player.y += player.vy;

  if (player.y >= H - 120) {
    player.y = H - 120;
    player.vy = 0;
    player.jumping = false;
  }

  timer++;
  if (timer > 50) {
    spawnObstacle();
    timer = 0;
  }

  speed += 0.002;
  score++;

  const px = laneX(player.lane);
  const py = player.y;

  for (let o of obstacles) {
    o.y += speed;

    const ox = laneX(o.lane);

    if (collide(px-25, py-50, 50, 50, ox-25, o.y-25, 50, 50)) {
      gameOver = true;
    }
  }

  obstacles = obstacles.filter(o => o.y < H + 200);

  document.getElementById("hud").innerText =
    "Score: " + score + (gameOver ? " | GAME OVER (refresh to restart)" : "");
}

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);

  // lanes
  for (let i=-1;i<=1;i++) {
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(laneX(i)-70,0,140,H);
  }

  // player
  ctx.fillStyle = "#ff3b3b";
  ctx.fillRect(laneX(player.lane)-25, player.y-50, 50, 50);

  // obstacles
  ctx.fillStyle = "#3bff3b";
  for (let o of obstacles) {
    ctx.fillRect(laneX(o.lane)-25, o.y-25, 50, 50);
  }

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", W/2 - 120, H/2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
